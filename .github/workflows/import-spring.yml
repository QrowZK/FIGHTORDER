name: Import Spring RTS wiki

# One-off / re-runnable migration of the Spring RTS wiki (springrts.com) into
# Fightorder. Manual dispatch only. Exports full-history XML from the source on
# the runner, rsyncs it to the server, and runs importDump.php over SSH.
#
# Safe to re-run: importDump skips revisions that already exist, and the source
# "Main Page" + the MediaWiki namespace are never exported, so Fightorder's own
# themed Main Page and MediaWiki:Common.css are never touched.
#
# Run the routine Deploy workflow FIRST (or push) so the ParserFunctions / Cite
# / SyntaxHighlight extensions are live before imported content is viewed.

on:
  workflow_dispatch:
    inputs:
      namespaces:
        description: "Namespaces to export (comma-sep: 0=Main 4=Spring 10=Template 12=Help 14=Category)"
        required: false
        default: "0,4,10,12,14"
      batch:
        description: "Titles per export request"
        required: false
        default: "25"
      limit:
        description: "Cap number of titles (0 = all; use a small number for a test run first)"
        required: false
        default: "0"

concurrency:
  group: deploy-dreamhost
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/known_hosts << 'EOF'
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ssh-rsa 
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBAkaYHyU1zRftfMKCccvUYej0IBpggmrPMYh3LsXilHrTqYw+lR77cGZnS80Dw/U+Hp8hpLPd5clg0pENheO3So=
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHoX0VlSRW0MPIwNPfzqzz0auG2OP0hWjAGfrjrrf1AC
          EOF
          chmod 600 ~/.ssh/known_hosts

      - name: Export Spring wiki (full history)
        run: |
          python3 scripts/export_spring.py \
            --out dump \
            --namespaces "${{ github.event.inputs.namespaces }}" \
            --batch "${{ github.event.inputs.batch }}" \
            --limit "${{ github.event.inputs.limit }}"
          echo "Batch files:"; ls -la dump/
          echo "Total pages / revisions across all batches:"
          grep -o '<page>' dump/*.xml | wc -l
          grep -o '<revision>' dump/*.xml | wc -l

      - name: Upload dumps + import script to server
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          # Stage the XML outside the docroot so it is never web-served.
          sshpass -e ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            "${SSH_USER}@${SSH_HOST}" "mkdir -p ~/spring-import && rm -f ~/spring-import/*.xml"
          cp scripts/import_remote.sh dump/import_remote.sh
          sshpass -e rsync -az \
            -e "ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no" \
            dump/ "${SSH_USER}@${SSH_HOST}:spring-import/"

      - name: Import into Fightorder
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          sshpass -e ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            "${SSH_USER}@${SSH_HOST}" \
            "bash ~/spring-import/import_remote.sh '${DEPLOY_PATH}'"
