name: Diagnose server for Scribunto (Lua) support

# One-off diagnostic: pushes a trivial test Module + a page invoking it via
# {{#invoke:}}, then reports whether it executed (vs. showing a script
# error). Confirms Scribunto + the deployed Lua binary actually work,
# not just that the extension loaded. Cleans up both test pages after.

on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/known_hosts << 'EOF'
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ssh-rsa 
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBAkaYHyU1zRftfMKCccvUYej0IBpggmrPMYh3LsXilHrTqYw+lR77cGZnS80Dw/U+Hp8hpLPd5clg0pENheO3So=
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHoX0VlSRW0MPIwNPfzqzz0auG2OP0hWjAGfrjrrf1AC
          EOF
          chmod 600 ~/.ssh/known_hosts

      - name: Push test Module + invoking page, check render
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          WG_ADMIN_USER: ${{ secrets.WG_ADMIN_USER }}
        run: |
          SSH="sshpass -e ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no ${SSH_USER}@${SSH_HOST}"

          echo ">>> pushing Module:ScribuntoSmokeTest"
          $SSH "cd '${DEPLOY_PATH}' && php maintenance/run.php edit --user '${WG_ADMIN_USER}' --summary 'diagnostic' 'Module:ScribuntoSmokeTest'" << 'LUA'
          local p = {}
          function p.hello()
          	return "SCRIBUNTO_LIVE_TEST_OK:" .. tostring(2 + 2)
          end
          return p
          LUA

          echo ">>> pushing ScribuntoSmokeTestPage"
          $SSH "cd '${DEPLOY_PATH}' && php maintenance/run.php edit --user '${WG_ADMIN_USER}' --summary 'diagnostic' 'ScribuntoSmokeTestPage'" << 'WT'
          {{#invoke:ScribuntoSmokeTest|hello}}
          WT

          echo ">>> fetching rendered page"
          curl -fsS "https://fightorder.net/wiki/ScribuntoSmokeTestPage" -o /tmp/rendered.html
          if grep -q "SCRIBUNTO_LIVE_TEST_OK:4" /tmp/rendered.html; then
            echo "RESULT: Scribunto executed the Lua module successfully."
          else
            echo "RESULT: Scribunto did NOT execute correctly. Page content:"
            grep -oE '<div class="mw-parser-output">.{0,400}' /tmp/rendered.html || cat /tmp/rendered.html | head -c 1000
            echo "SCRIBUNTO_FAILED=1" >> "$GITHUB_ENV"
          fi

      - name: Clean up test pages
        if: always()
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          WG_ADMIN_USER: ${{ secrets.WG_ADMIN_USER }}
        run: |
          # Write titles to a real remote temp file rather than piping via
          # /dev/stdin — deleteBatch.php failed to read /dev/stdin reliably
          # over a non-interactive SSH session.
          SSH="sshpass -e ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no ${SSH_USER}@${SSH_HOST}"
          $SSH "cat > /tmp/zk_diag_delete_list.txt" << 'TITLES'
          Module:ScribuntoSmokeTest
          ScribuntoSmokeTestPage
          TITLES
          $SSH "cd '${DEPLOY_PATH}' && php maintenance/run.php deleteBatch -u '${WG_ADMIN_USER}' -r 'diagnostic cleanup' /tmp/zk_diag_delete_list.txt && rm -f /tmp/zk_diag_delete_list.txt"

      - name: Fail job if Scribunto didn't execute
        if: ${{ env.SCRIBUNTO_FAILED == '1' }}
        run: exit 1
