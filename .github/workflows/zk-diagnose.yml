name: Diagnose server for Scribunto (Lua) support

# One-off diagnostic: checks whether the DreamHost account has a usable Lua
# interpreter or PHP capability for Scribunto (needed to execute the Zero-K
# wiki's Module: namespace Lua templates). Read-only, changes nothing.

on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/known_hosts << 'EOF'
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ssh-rsa 
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBAkaYHyU1zRftfMKCccvUYej0IBpggmrPMYh3LsXilHrTqYw+lR77cGZnS80Dw/U+Hp8hpLPd5clg0pENheO3So=
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHoX0VlSRW0MPIwNPfzqzz0auG2OP0hWjAGfrjrrf1AC
          EOF
          chmod 600 ~/.ssh/known_hosts

      - name: Probe Lua / exec availability
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          sshpass -e ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            "${SSH_USER}@${SSH_HOST}" '
              echo "== uname =="; uname -m -s
              echo "== which lua5.1 / lua / luajit =="
              which lua5.1 2>/dev/null || echo "no lua5.1"
              which lua 2>/dev/null || echo "no lua"
              which luajit 2>/dev/null || echo "no luajit"
              echo "== php -m (loaded modules, look for luasandbox) =="
              php -m 2>/dev/null | grep -i lua || echo "no lua-related php module"
              echo "== php disabled functions (need exec/proc_open for luastandalone) =="
              php -i 2>/dev/null | grep -i "disable_functions"
              echo "== php version =="
              php -v 2>/dev/null | head -1
            '
