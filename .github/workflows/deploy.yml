name: Deploy MediaWiki to DreamHost

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_install:
        description: "Run install.php instead of update.php (first-time setup / fresh DB only)"
        required: false
        default: "false"
      import_content:
        description: "Import content/ into the wiki (Main Page + Common.css). Overwrites in-wiki edits to those pages."
        required: false
        default: "false"

# Serialise deploys so a manual (import/install) run never races a push run's
# rsync to the same server. Runs queue instead of overlapping.
concurrency:
  group: deploy-dreamhost
  cancel-in-progress: false

env:
  MEDIAWIKI_VERSION: "1.43.1"
  # Citizen skin release tag (without leading "v"). Requires MediaWiki >= 1.43.0.
  CITIZEN_VERSION: "3.18.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/known_hosts << 'EOF'
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ssh-rsa 
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBAkaYHyU1zRftfMKCccvUYej0IBpggmrPMYh3LsXilHrTqYw+lR77cGZnS80Dw/U+Hp8hpLPd5clg0pENheO3So=
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHoX0VlSRW0MPIwNPfzqzz0auG2OP0hWjAGfrjrrf1AC
          EOF
          chmod 600 ~/.ssh/known_hosts

      - name: Download MediaWiki
        run: |
          curl -fLo mediawiki.tar.gz \
            "https://releases.wikimedia.org/mediawiki/${MEDIAWIKI_VERSION%.*}/mediawiki-${MEDIAWIKI_VERSION}.tar.gz"
          mkdir build
          tar -xzf mediawiki.tar.gz -C build --strip-components=1

      - name: Download Citizen skin
        run: |
          # Citizen ships its assets prebuilt and compiles its LESS via
          # ResourceLoader at runtime, so no npm/composer build is needed.
          curl -fLo citizen.tar.gz \
            "https://github.com/StarCitizenTools/mediawiki-skins-Citizen/archive/refs/tags/v${CITIZEN_VERSION}.tar.gz"
          mkdir -p build/skins/Citizen
          tar -xzf citizen.tar.gz -C build/skins/Citizen --strip-components=1
          test -f build/skins/Citizen/skin.json  # fail loudly if the layout changed

      - name: Render LocalSettings.php from template
        env:
          WG_SITE_NAME: ${{ vars.WG_SITE_NAME || 'FIGHTORDER' }}
          WG_SERVER: ${{ vars.WG_SERVER || 'https://fightorder.net' }}
          WG_EMERGENCY_CONTACT: ${{ vars.WG_EMERGENCY_CONTACT || 'admin@fightorder.net' }}
          WG_DB_HOST: ${{ secrets.WG_DB_HOST }}
          WG_DB_NAME: ${{ secrets.WG_DB_NAME }}
          WG_DB_USER: ${{ secrets.WG_DB_USER }}
          WG_DB_PASSWORD: ${{ secrets.WG_DB_PASSWORD }}
          WG_SECRET_KEY: ${{ secrets.WG_SECRET_KEY }}
          WG_UPGRADE_KEY: ${{ secrets.WG_UPGRADE_KEY }}
        run: |
          sed \
            -e "s|__WG_SITE_NAME__|${WG_SITE_NAME}|g" \
            -e "s|__WG_SERVER__|${WG_SERVER}|g" \
            -e "s|__WG_EMERGENCY_CONTACT__|${WG_EMERGENCY_CONTACT}|g" \
            -e "s|__WG_DB_HOST__|${WG_DB_HOST}|g" \
            -e "s|__WG_DB_NAME__|${WG_DB_NAME}|g" \
            -e "s|__WG_DB_USER__|${WG_DB_USER}|g" \
            -e "s|__WG_DB_PASSWORD__|${WG_DB_PASSWORD}|g" \
            -e "s|__WG_SECRET_KEY__|${WG_SECRET_KEY}|g" \
            -e "s|__WG_UPGRADE_KEY__|${WG_UPGRADE_KEY}|g" \
            config/LocalSettings.template.php > build/LocalSettings.php

      - name: Sync any local overrides / extensions / skins from repo
        run: |
          [ -d overrides ] && rsync -a overrides/ build/ || true

      - name: Upload to DreamHost
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # --delete keeps the server a mirror of build/, but user uploads
          # (images/) and the runtime file cache (cache/) live only on the
          # server and must survive deploys — exclude them from the sync so
          # they're never deleted or overwritten. LocalSettings.php.deployed
          # is a transient artifact from the first-install step.
          sshpass -e rsync -az --delete \
            --exclude='/images/' \
            --exclude='/cache/' \
            --exclude='LocalSettings.php.deployed' \
            -e "ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no" \
            build/ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      - name: Run install.php against fresh DB, then restore our config (first-time only)
        if: ${{ github.event.inputs.run_install == 'true' }}
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          WG_SITE_NAME: ${{ vars.WG_SITE_NAME || 'FIGHTORDER' }}
          WG_SERVER: ${{ vars.WG_SERVER || 'https://fightorder.net' }}
          WG_DB_HOST: ${{ secrets.WG_DB_HOST }}
          WG_DB_NAME: ${{ secrets.WG_DB_NAME }}
          WG_DB_USER: ${{ secrets.WG_DB_USER }}
          WG_DB_PASSWORD: ${{ secrets.WG_DB_PASSWORD }}
          WG_ADMIN_USER: ${{ secrets.WG_ADMIN_USER }}
          WG_ADMIN_PASSWORD: ${{ secrets.WG_ADMIN_PASSWORD }}
        run: |
          # update.php's compat check assumes the `revision` table already
          # exists (it fatal-errors on ANY database missing rev_actor,
          # including a brand new empty one) — so it can't create the
          # initial schema. install.php can, but refuses to run once a
          # LocalSettings.php is already present. So: move our deployed
          # config aside, let install.php build the schema + admin account
          # using its own throwaway config, then put our real config back.
          sshpass -e ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            "${SSH_USER}@${SSH_HOST}" \
            "cd '${DEPLOY_PATH}' && \
             mv LocalSettings.php LocalSettings.php.deployed && \
             mkdir -p /tmp/mw-install-scratch && \
             php maintenance/run.php install \
               --dbserver='${WG_DB_HOST}' \
               --dbname='${WG_DB_NAME}' \
               --dbuser='${WG_DB_USER}' \
               --dbpass='${WG_DB_PASSWORD}' \
               --server='${WG_SERVER}' \
               --scriptpath= \
               --confpath=/tmp/mw-install-scratch \
               --pass='${WG_ADMIN_PASSWORD}' \
               '${WG_SITE_NAME}' '${WG_ADMIN_USER}'; \
             mv LocalSettings.php.deployed LocalSettings.php && \
             php maintenance/run.php update --quick"

      - name: Run update.php (routine deploys)
        if: ${{ github.event.inputs.run_install != 'true' }}
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          sshpass -e ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            "${SSH_USER}@${SSH_HOST}" \
            "cd '${DEPLOY_PATH}' && php maintenance/run.php update --quick"

      - name: Import wiki content (opt-in)
        if: ${{ github.event.inputs.import_content == 'true' }}
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          WG_ADMIN_USER: ${{ secrets.WG_ADMIN_USER }}
        run: |
          # Pipe each repo file into MediaWiki's edit.php over SSH stdin, as the
          # admin user. Common.css needs the editsitecss right (granted to sysop
          # in LocalSettings). These pages are repo-managed: importing overwrites
          # whatever is currently in the wiki for them.
          import_page () {
            local title="$1" file="$2"
            echo "Importing '$title' from $file ..."
            sshpass -e ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no \
              "${SSH_USER}@${SSH_HOST}" \
              "cd '${DEPLOY_PATH}' && php maintenance/run.php edit \
                 --user '${WG_ADMIN_USER}' \
                 --summary 'Deploy from repo (GitHub Actions)' \
                 '${title}'" < "$file"
          }
          import_page "MediaWiki:Common.css" content/Common.css
          import_page "Main Page"            content/Main_Page.wikitext
