name: Import Recoil Engine wiki

# One-off / re-runnable import of the RecoilEngine GitHub wiki
# (github.com/beyond-all-reason/RecoilEngine/wiki — a git repo of Markdown
# pages) into Fightorder, verbatim, converted to MediaWiki wikitext.
#
# Manual dispatch only. Re-runnable: each page is pushed via edit.php, which
# just creates a new revision (idempotent from the wiki's perspective; running
# again after an upstream update re-syncs the verbatim copy).
#
# Home.md is intentionally skipped — content/Recoil_Engine.wikitext (a themed
# portal, same pattern as the Spring RTS portal) takes its place and is
# imported separately by this workflow.

on:
  workflow_dispatch: {}

concurrency:
  group: deploy-dreamhost
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fightorder
        uses: actions/checkout@v4

      - name: Install pandoc + sshpass
        run: sudo apt-get update && sudo apt-get install -y pandoc sshpass

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/known_hosts << 'EOF'
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ssh-rsa 
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBAkaYHyU1zRftfMKCccvUYej0IBpggmrPMYh3LsXilHrTqYw+lR77cGZnS80Dw/U+Hp8hpLPd5clg0pENheO3So=
          iad1-shared-b7-38.dreamhost.com,67.205.0.102 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHoX0VlSRW0MPIwNPfzqzz0auG2OP0hWjAGfrjrrf1AC
          EOF
          chmod 600 ~/.ssh/known_hosts

      - name: Clone RecoilEngine wiki
        run: git clone --quiet https://github.com/beyond-all-reason/RecoilEngine.wiki.git recoil_wiki

      - name: Convert Markdown -> MediaWiki wikitext
        run: |
          python3 scripts/import_recoil.py --wiki-repo recoil_wiki --out recoil_pages
          echo "Pages converted:"; wc -l < recoil_pages/MANIFEST.tsv

      - name: Push pages to Fightorder
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          WG_ADMIN_USER: ${{ secrets.WG_ADMIN_USER }}
        run: |
          while IFS=$'\t' read -r title file; do
            echo "Importing '${title}' ..."
            sshpass -e ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no \
              "${SSH_USER}@${SSH_HOST}" \
              "cd '${DEPLOY_PATH}' && php maintenance/run.php edit \
                 --user '${WG_ADMIN_USER}' \
                 --summary 'Verbatim import from RecoilEngine wiki (GitHub)' \
                 '${title}'" < "recoil_pages/${file}"
          done < recoil_pages/MANIFEST.tsv

      - name: Push Recoil Engine portal page
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          WG_ADMIN_USER: ${{ secrets.WG_ADMIN_USER }}
        run: |
          sshpass -e ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            "${SSH_USER}@${SSH_HOST}" \
            "cd '${DEPLOY_PATH}' && php maintenance/run.php edit \
               --user '${WG_ADMIN_USER}' \
               --summary 'Deploy Recoil Engine portal (GitHub Actions)' \
               'Recoil Engine'" < content/Recoil_Engine.wikitext
